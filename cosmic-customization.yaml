- name: COSMIC OS customization
  hosts: 127.0.0.1
  connection: local

  vars:
    xkb_config_path: "~/.config/cosmic/com.system76.CosmicComp/v1/xkb_config"
    is_wsl: "{{ lookup('file', '/proc/version') is regex('(M|m)icrosoft') }}"
    is_pop_24_04_plus: "{{ ansible_distribution == 'Pop!_OS' and (ansible_distribution_major_version | int) >= 24 }}"
    is_cosmic: "{{ is_pop_24_04_plus and not is_wsl }}"

  tasks:
    - name: Ensure COSMIC configuration folder exists
      file:
        path: "{{ xkb_config_path | dirname }}"
        state: directory
        mode: 0700
      when: is_cosmic

    - name: Get current xkb_config content
      stat:
        path: "{{ xkb_config_path }}"
      register: xkb_config_stat
      when: is_cosmic

    - name: Update xkb_config with Alt/Ctrl swap
      copy:
        dest: "{{ xkb_config_path }}"
        content: |
          (
              rules: "",
              model: "",
              layout: "us",
              variant: "",
              options: Some("lv3:ralt_switch,compose:rctrl,caps:swapescape,ctrl:swap_lalt_lctl,ctrl:swap_ralt_rctl"),
              repeat_delay: 600,
              repeat_rate: 25,
          )
        mode: 0644
      when: is_cosmic

    - name: Enable Natural Scrolling (COSMIC)
      copy:
        dest: "~/.config/cosmic/com.system76.CosmicComp/v1/input_touchpad"
        content: |
          (
              state: Enabled,
              click_method: Some(Clickfinger),
              scroll_config: Some((
                  method: Some(TwoFinger),
                  natural_scroll: Some(true),
                  scroll_button: None,
                  scroll_factor: None,
              )),
              tap_config: Some((
                  enabled: true,
                  button_map: Some(LeftRightMiddle),
                  drag: true,
                  drag_lock: false,
              )),
          )
        mode: 0644
      when: is_cosmic

    - name: Ensure COSMIC shortcuts configuration folder exists
      file:
        path: "~/.config/cosmic/com.system76.CosmicSettings.Shortcuts/v1"
        state: directory
        mode: 0700
      when: is_cosmic

    - name: Add CopyQ shortcut (COSMIC)
      copy:
        dest: "~/.config/cosmic/com.system76.CosmicSettings.Shortcuts/v1/custom"
        content: |
          {
              "copyq": (
                  name: "CopyQ",
                  description: "Show CopyQ main window",
                  command: "/usr/bin/copyq show",
                  bindings: ["<Control><Alt>c"],
              ),
          }
        mode: 0644
      when: is_cosmic

    - name: Install Papirus icon theme
      become: yes
      apt:
        package: papirus-icon-theme
      when: is_cosmic

    - name: Ensure COSMIC Tk configuration folder exists
      file:
        path: "~/.config/cosmic/com.system76.CosmicTk/v1"
        state: directory
        mode: 0700
      when: is_cosmic

    - name: Set COSMIC icon theme to Papirus-Dark
      copy:
        dest: "~/.config/cosmic/com.system76.CosmicTk/v1/icon_theme"
        content: '"Papirus-Dark"'
        mode: 0644
      when: is_cosmic

    # Slack and Discord ship .desktop files that set Icon= to an absolute PNG,
    # bypassing icon-theme lookup. The dock then scales one bitmap and the
    # result is chunky. Drop user-local overrides that point Icon= at the
    # theme name so Papirus's SVG is used instead.
    - name: Ensure local applications directory exists
      file:
        path: "~/.local/share/applications"
        state: directory
        mode: 0755
      when: is_cosmic

    - name: Check for system Slack .desktop
      stat:
        path: /usr/share/applications/slack.desktop
      register: slack_desktop
      when: is_cosmic

    - name: Override Slack .desktop with theme icon name
      copy:
        dest: "~/.local/share/applications/slack.desktop"
        content: "{{ lookup('file', '/usr/share/applications/slack.desktop') | regex_replace('(?m)^Icon=.*$', 'Icon=slack') }}"
        mode: 0644
      when: is_cosmic and slack_desktop.stat.exists

    - name: Check for system Discord .desktop
      stat:
        path: /var/lib/snapd/desktop/applications/discord_discord.desktop
      register: discord_desktop
      when: is_cosmic

    - name: Override Discord .desktop with theme icon name
      copy:
        dest: "~/.local/share/applications/discord_discord.desktop"
        content: "{{ lookup('file', '/var/lib/snapd/desktop/applications/discord_discord.desktop') | regex_replace('(?m)^Icon=.*$', 'Icon=discord') }}"
        mode: 0644
      when: is_cosmic and discord_desktop.stat.exists
