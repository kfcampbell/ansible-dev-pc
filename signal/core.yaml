- name: Signal
  hosts: 127.0.0.1
  connection: local

  tasks:
    - set_fact: is_wsl={{ lookup('file', '/proc/version') is regex('(M|m)icrosoft') }}

    - name: "[Non-WSL] Add Signal APT package key"
      become: yes
      get_url:
        url: https://updates.signal.org/desktop/apt/keys.asc
        dest: /etc/apt/trusted.gpg.d/signal.asc
        mode: 0644
      when: not is_wsl

    - name: "[Non-WSL] Add Signal APT package repository"
      become: yes
      apt_repository:
        repo: deb [arch=amd64] https://updates.signal.org/desktop/apt xenial main
        filename: signal
        update_cache: no
      register: apt_repository
      when: not is_wsl

    - name: "[Non-WSL] Update APT package list"
      become: yes
      apt:
        update_cache: yes
      when: apt_repository.changed
      register: apt_update
      retries: 5
      until: apt_update is success

    - name: "[Non-WSL] Install Signal"
      become: yes
      apt:
        package: signal-desktop
      when: not is_wsl
