- name: NodeJS (customization)
  hosts: 127.0.0.1
  connection: local

  tasks:
    - name: Test for installed NodeJS LTS
      shell: bash -ic "nvm ls lts/*" >/dev/null
      register: nvm_ls
      ignore_errors: yes

    - name: Install NodeJS LTS
      command: bash -ic "nvm install lts/*"
      when: nvm_ls.failed

    - name: Use NodeJS LTS by default
      command: bash -ic "nvm use --lts"
      when: nvm_ls.failed

    - name: Install AI tools (Claude Code and Gemini CLI)
      command: bash -ic "npm install -g @anthropic-ai/claude-code @google/gemini-cli"
      register: npm_install
      changed_when: "'added' in npm_install.stdout or 'updated' in npm_install.stdout"
